<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="https://pixlstash.dev/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The demo is on holiday | PixlStash</title>
    <meta
      name="description"
      content="The PixlStash live demo is taking a short break. You can still try PixlStash right now by downloading and running it yourself."
    />
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tiny5&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* This page is intentionally self-contained: the design tokens and base
         styles below are inlined from the site's pixlstash.css so the file can be
         served from any server on its own, with no co-located files. It still
         references a few remote resources by absolute URL, all of which degrade
         gracefully: the Google Fonts link above (falls back to system fonts), and
         the favicon + logo loaded from https://pixlstash.dev/. All navigation
         points at absolute https://pixlstash.dev/ URLs too. */
      :root {
        --bg: #d3d5d7;
        --bg-2: #d3d5d7;
        --panel: rgba(255, 255, 255, 0.94);
        --text: #393f46;
        --muted: rgba(57, 63, 70, 0.7);
        --accent: #8ea604;
        --accent-2: #7f8f1a;
        --logo-accent: #f28f3b;
        --shadow: rgba(17, 20, 26, 0.18);
        --sans: "Space Grotesk", "Segoe UI", system-ui, sans-serif;
        --radius-lg: 22px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: var(--sans);
        color: var(--text);
        background:
          radial-gradient(
            circle at 15% 10%,
            rgba(159, 177, 31, 0.18),
            transparent 45%
          ),
          radial-gradient(
            circle at 85% 0%,
            rgba(47, 139, 95, 0.16),
            transparent 40%
          ),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
        min-height: 100vh;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .shell {
        max-width: 1320px;
        margin: 0 auto;
        padding: 8px 16px 80px;
      }

      .page-footer {
        margin-top: 72px;
        text-align: center;
        font-size: 0.82rem;
        color: var(--muted);
      }

      .page-footer a {
        color: var(--accent-2);
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      /* Simple brand header (this standalone page deliberately skips the shared
         nav, whose "Try demo" button would contradict a "demo on holiday" page). */
      .holiday-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 4px;
      }

      .holiday-header img {
        width: 36px;
        height: 36px;
        object-fit: contain;
      }

      .holiday-header .brand-name {
        font-family: "Tiny5", monospace;
        font-size: 2.2rem;
        letter-spacing: 0.02em;
        color: var(--text);
      }

      /* "Stash" half of the wordmark in the brand orange. */
      .brand-stash {
        color: var(--logo-accent);
      }

      .holiday-card {
        max-width: 680px;
        margin: 40px auto 0;
        background: var(--panel);
        border: 1px solid rgba(34, 38, 44, 0.1);
        border-radius: var(--radius-lg);
        box-shadow: 0 16px 48px var(--shadow);
        padding: 36px 36px 40px;
        text-align: center;
      }

      .holiday-illustration {
        width: 100%;
        max-width: 360px;
        height: auto;
        margin: 0 auto 22px;
        display: block;
      }

      .holiday-card h1 {
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        line-height: 1.1;
        margin: 0 0 14px;
      }

      .holiday-card p {
        font-size: 1.08rem;
        color: var(--muted);
        line-height: 1.65;
        margin: 0 auto 26px;
        max-width: 520px;
      }

      .cta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
      }

      .btn {
        padding: 12px 18px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 0.95rem;
        border: 1px solid transparent;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .btn-primary {
        background: linear-gradient(130deg, var(--accent), var(--accent-2));
        color: #ffffff;
        box-shadow: 0 12px 30px rgba(97, 117, 12, 0.25);
      }

      .btn-secondary {
        background: rgba(34, 38, 44, 0.06);
        color: var(--text);
        border-color: rgba(34, 38, 44, 0.16);
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 26px rgba(142, 166, 4, 0.28);
      }

      @media (max-width: 700px) {
        .shell {
          padding: 8px 12px 60px;
        }
      }

      @media (max-width: 560px) {
        .holiday-card {
          padding: 24px 20px 28px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <a class="holiday-header" href="https://pixlstash.dev/" aria-label="PixlStash home">
        <img src="https://pixlstash.dev/assets/logo.png" alt="PixlStash logo" />
        <span class="brand-name">Pixl<span class="brand-stash">Stash</span></span>
      </a>

      <main class="holiday-card">
        <svg
          class="holiday-illustration"
          viewBox="0 0 360 220"
          role="img"
          aria-label="The sun over a calm sea and a sandy beach"
          xmlns="http://www.w3.org/2000/svg"
        >
          <defs>
            <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#bfe3df" />
              <stop offset="1" stop-color="#e7ecd6" />
            </linearGradient>
            <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#2f8b5f" />
              <stop offset="1" stop-color="#3aa3a0" />
            </linearGradient>
          </defs>
          <rect x="0" y="0" width="360" height="220" rx="16" fill="url(#sky)" />
          <circle cx="290" cy="58" r="30" fill="#f28f3b" opacity="0.9" />
          <path d="M0 150 q90 -22 180 -4 t180 -6 v80 H0 Z" fill="url(#sea)" />
          <path d="M0 168 q90 16 180 2 t180 4 v46 H0 Z" fill="#e9dcab" />
        </svg>

        <h1>We're on holiday! 🌴</h1>
        <p>
          The live demo is taking a short break and will be back soon. In the
          meantime you can still try PixlStash by downloading it and running it
          on your own machine. It is free and self-hosted.
        </p>

        <div class="cta-row">
          <a class="btn btn-primary" href="https://pixlstash.dev/install.html"
            >Download PixlStash</a
          >
          <a class="btn btn-secondary" href="https://pixlstash.dev/"
            >Back to home</a
          >
        </div>
      </main>

      <div class="page-footer">
        <p>
          <a href="https://pixlstash.dev/">Back to PixlStash home</a>
        </p>
      </div>
    </div>
  </body>
</html>
