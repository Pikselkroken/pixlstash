app = 'pixlstash-demo'
primary_region = 'arn'

[build]
  # Path is resolved relative to THIS config file's dir (holiday/), not the repo
  # root. The build context is still the repo root (the `.` in the deploy command),
  # so the Dockerfile's COPY paths stay repo-root-relative.
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false          # do NOT let a request wake anything
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
