name: Collect Metrics

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: # allow manual runs
    inputs:
      backfill_clones:
        description: "Backfill clone metrics in history.json from GitHub traffic data"
        type: boolean
        required: false
        default: false
  push:
    branches:
      - metrics

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: develop
          path: pixlstash

      - uses: actions/checkout@v6
        with:
          repository: Pikselkroken/pixlstash-metrics
          token: ${{ secrets.METRICS_REPO_PAT }}
          path: pixlstash-metrics

      - name: Fetch metrics
        working-directory: pixlstash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          HISTORY_PATH: ${{ github.workspace }}/pixlstash-metrics/history.json
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.backfill_clones }}" = "true" ]; then
            BACKFILL_CLONES=1 python .github/scripts/collect_metrics.py
          else
            python .github/scripts/collect_metrics.py
          fi

      - name: Commit updated history
        working-directory: pixlstash-metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --staged --quiet || git commit -m "chore: update metrics [skip ci]"
          git push
