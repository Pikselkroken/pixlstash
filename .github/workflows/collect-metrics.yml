name: Collect Metrics

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: # allow manual runs
    inputs:
      backfill_clones:
        description: "Backfill clone metrics in metrics/history.json from GitHub traffic data"
        type: boolean
        required: false
        default: false
  push:
    branches:
      - metrics

permissions:
  contents: write # needed to commit history.json back to the repo

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Fetch metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.backfill_clones }}" = "true" ]; then
            BACKFILL_CLONES=1 python .github/scripts/collect_metrics.py
          else
            python .github/scripts/collect_metrics.py
          fi

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metrics/history.json
          git diff --staged --quiet || git commit -m "chore: update metrics [skip ci]"
          git push
