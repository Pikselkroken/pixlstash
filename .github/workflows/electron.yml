name: Build Electron Desktop App

# Builds the cross-platform desktop app for a release:
#   1. build the pixlstash wheel once (shared, also published to PyPI),
#   2. per OS: build the bundled CPU/Metal Python runtime, embed it via
#      electron-builder extraResources, and build the installers.
# GPU acceleration (CUDA/ROCm) is NOT bundled or hosted. The desktop app adds it
# on demand by pip-installing the heavy wheels straight from PyPI / PyTorch.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Least privilege: the workflow defaults to read-only. Only build-electron, which
# attaches installers to the GitHub release, is granted contents: write (and even
# that uses the RELEASE_BOT_TOKEN for the release itself). build-wheel only checks
# out and uploads a workflow artifact, so it stays read-only.
permissions:
  contents: read

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        run: cd frontend && npm ci && npm run build
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
      - name: Resolve version
        id: version
        run: |
          version=$(python -c "import tomllib,pathlib;print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          pre=$(python -c "from packaging.version import Version;print('true' if Version('$version').is_prerelease else 'false')")
          echo "is_prerelease=$pre" >> "$GITHUB_OUTPUT"
      - name: Validate tag matches version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          [ "${{ github.ref_name }}" = "v${{ steps.version.outputs.version }}" ] || { echo "tag/version mismatch"; exit 1; }
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheel
          path: dist/*.whl

  build-electron:
    needs: build-wheel
    # Needs write to attach installers to the GitHub release (softprops below).
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, os: linux, arch: x64, accel: cpu }
          - { runner: windows-latest, os: win, arch: x64, accel: cpu }
          # macOS (Apple Silicon, Metal). Builds UNSIGNED until the Apple Developer ID
          # signing secrets are added to the repo (see "Build Electron installers"
          # below and docs/macos-signing-setup.md): unsigned artifacts get a
          # "-unsigned" suffix and Gatekeeper quarantines them. Once the signing
          # secrets are set the build signs + notarises and drops the suffix.
          - { runner: macos-14, os: mac, arch: arm64, accel: metal }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: wheel
          path: dist
      - name: Cache runtime build inputs (CPython tarball + pip wheels)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .build-cache
          # Keyed per platform; the build script's hash busts it when pins
          # (CPython / torch index / deps) change. restore-keys reuses the most
          # recent cache for this platform even after a bust.
          key: build-runtime-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.accel }}-${{ hashFiles('scripts/build_desktop_runtime.py') }}
          restore-keys: |
            build-runtime-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.accel }}-
      - name: Build bundled runtime (${{ matrix.os }}/${{ matrix.arch }}/${{ matrix.accel }})
        shell: bash
        run: |
          WHEEL=$(ls dist/pixlstash-*.whl | head -n1)
          python scripts/build_desktop_runtime.py \
            --wheel "$WHEEL" \
            --os ${{ matrix.os }} --arch ${{ matrix.arch }} --accel ${{ matrix.accel }} \
            --output-dir electron/resources
      # Install deps in a step WITHOUT the signing secrets in scope: npm ci runs
      # third-party dependency lifecycle scripts, which must never see the Apple
      # certificate or notarisation credentials.
      - name: Install desktop dependencies
        working-directory: electron
        run: npm ci
      - name: Build Electron installers
        working-directory: electron
        shell: bash
        # macOS signing + notarisation is opt-in via secrets. When APPLE_CSC_LINK (a
        # base64-encoded Developer ID Application .p12) is present the mac build is
        # signed (and notarised, if the APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/
        # APPLE_TEAM_ID secrets are also set) and ships under its clean name. When the
        # cert secret is absent the build still runs but is UNSIGNED and labelled with
        # a "-unsigned" suffix. Windows/Linux are unaffected and always unsigned here.
        # Full setup: docs/macos-signing-setup.md.
        #
        # The Apple secrets are scoped to the macOS runner only (the ternary yields
        # an empty string elsewhere) so the certificate never lands on the Windows or
        # Linux runners that have no use for it.
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          CSC_LINK: ${{ matrix.os == 'mac' && secrets.APPLE_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'mac' && secrets.APPLE_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.os == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.os == 'mac' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'mac' && secrets.APPLE_TEAM_ID || '' }}
        run: |
          set -euo pipefail
          if [ "${{ matrix.os }}" != "mac" ]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            npm run dist -- --publish never
            exit 0
          fi
          # Signing the bundled Python/torch tree opens tens of thousands of files
          # (torch alone ships thousands of headers), and the macOS runner's default
          # descriptor limit (256) trips codesign with EMFILE. Raise it as high as
          # the hard limit allows before building.
          ulimit -n 65536 2>/dev/null || ulimit -n "$(ulimit -Hn)" 2>/dev/null || true
          # macOS: branch on whether the signing certificate secret is available.
          # Notarisation needs no config: electron-builder notarises automatically
          # when APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD and APPLE_TEAM_ID are all set
          # (it reads them from the environment), and skips notarisation when they
          # are absent. Setting a `notarize` value is unnecessary and `false` would
          # disable it outright.
          if [ -n "${CSC_LINK:-}" ]; then
            # electron-builder only auto-detects CSC_LINK as base64 when it starts
            # with a data: URI, is over 2048 chars, or ends with '='. A small .p12
            # can miss all three and get mistaken for a file path (build fails with
            # "... doesn't exist"). Normalise a bare base64 secret to a data: URI so
            # any valid base64 value works; leave an already-prefixed value alone.
            case "$CSC_LINK" in
              data:*) ;;
              *) export CSC_LINK="data:application/x-pkcs12;base64,${CSC_LINK}" ;;
            esac
            export CSC_IDENTITY_AUTO_DISCOVERY=true
            if [ -z "${APPLE_ID:-}" ] && [ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] && [ -z "${APPLE_TEAM_ID:-}" ]; then
              echo "::warning title=macOS signed but not notarised::Signing certificate is present but no notarisation credentials are set. The app will be signed but NOT notarised, so Gatekeeper still blocks it on download. Add APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID to finish the chain (docs/macos-signing-setup.md)."
            fi
            npm run dist -- --publish never
          else
            echo "::warning title=Unsigned macOS build::No Apple signing certificate (APPLE_CSC_LINK secret) found. Building UNSIGNED and labelling the artifact '-unsigned'. Gatekeeper will quarantine it until the signing secrets are added (docs/macos-signing-setup.md)."
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            npm run dist -- --publish never --config.mac.artifactName='${productName}-desktop-${version}-${os}-${arch}-unsigned.${ext}'
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pixlstash-desktop-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            electron/release/*.exe
            electron/release/*.AppImage
            electron/release/*.deb
            electron/release/*.dmg
            electron/release/*.zip
      - name: Attach installers to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          token: ${{ secrets.RELEASE_BOT_TOKEN }}
          files: |
            electron/release/*.exe
            electron/release/*.AppImage
            electron/release/*.deb
            electron/release/*.dmg
          prerelease: ${{ needs.build-wheel.outputs.is_prerelease == 'true' }}
