name: Deploy website to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - 'pixlstash/**'
      - 'scripts/generate_openapi_docs.py'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Generate OpenAPI docs
        run: |
          python scripts/generate_openapi_docs.py --output-dir website/api

      - name: Generate latest-version.json
        run: |
          python - <<'EOF'
          import json, re, tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          version = data["project"]["version"]

          # Parse the first version block in CHANGELOG.md for a [Security: LEVEL] tag.
          # Convention: # [VERSION] [Security: LEVEL]  (LEVEL = Critical/High/Moderate/Low)
          security_level = None
          with open("CHANGELOG.md", "r", encoding="utf-8") as f:
              for line in f:
                  line = line.strip()
                  if not line.startswith("#"):
                      continue
                  # First heading is always the latest version block
                  m = re.search(r"\[Security:\s*(Critical|High|Moderate|Low)\]", line, re.IGNORECASE)
                  if m:
                      security_level = m.group(1).capitalize()
                  break  # only inspect the first version heading

          payload = {"version": version}
          if security_level:
              payload["security"] = security_level

          with open("website/latest-version.json", "w") as out:
              json.dump(payload, out)
          print(f"latest-version.json: {version}, security={security_level}")
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
