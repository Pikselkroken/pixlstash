# fly.toml — Read-only demo deployment for pixlstash-demo.fly.dev
#
# Data (vault.db + images) is baked into the image — no persistent volume.
# Deploy with:
#   flyctl deploy --image registry.fly.io/pixlstash-demo:latest

app = 'pixlstash-demo'
primary_region = 'arn'

# No [build] section — always deploy a pre-built image:
#   docker build -f Dockerfile.demo -t registry.fly.io/pixlstash-demo:latest .
#   flyctl auth docker && docker push registry.fly.io/pixlstash-demo:latest
#   flyctl deploy --image registry.fly.io/pixlstash-demo:latest

[env]
  PIXLSTASH_PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
